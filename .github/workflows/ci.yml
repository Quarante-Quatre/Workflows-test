name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit

      - name: Write summary
        if: always()
        run: |
          echo "### Résultats CI 🚀" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests passés" >> $GITHUB_STEP_SUMMARY
          echo "✅ Linter passé" >> $GITHUB_STEP_SUMMARY
          echo "✅ Audit passé" >> $GITHUB_STEP_SUMMARY